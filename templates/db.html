<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <a href="/" class="link">back home</a>
    
    <table>
        <thead>
            <tr>
                <th>Sender</th>
                <th>Message</th>
            </tr>
        </thead>

        <tbody>
            {% for message in data %}
            <tr>
                <td>{{ message.sender }}</td>
                <td>{{ message.body }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>

</html>
